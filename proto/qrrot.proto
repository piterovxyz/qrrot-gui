syntax = "proto3";

package qrrot.v1;

option go_package = "qrrot/api/proto/v1;qrrotv1";

service QrrotService {
  rpc Get (GetRequest) returns (stream GetResponse);
  rpc Put (stream PutRequest) returns (PutResponse);
  rpc Keys (KeysRequest) returns (stream KeysResponse);
}

message Metadata {
  string key = 1;
  string mime_type = 2;
}

message GetRequest {
  string key = 1;
  string token = 2;
}

message GetResponse {
  oneof data {
    Metadata metadata = 1;
    bytes chunk = 2;
  }
}

message PutRequest {
  oneof data {
    Metadata metadata = 1;
    bytes chunk = 2;
  }
  string token = 3;
}

message PutResponse {
  string status = 1;
}


message KeysRequest {
  string token = 1;
}

message KeyInfo {
  string key = 1;
  uint64 size = 2;
  string mime_type = 3;
}

message KeysResponse {
  repeated KeyInfo keys = 1;
}
